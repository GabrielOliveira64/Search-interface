<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">Portal</div>
    <button class="settings-btn" onclick="openSettings()" title="Configurações">⚙️</button>
  </div>

  <!-- HERO: DATETIME -->
  <div class="hero">
    <div class="datetime">
      <div class="time-display" id="clock">00:00:00</div>
      <div class="date-display" id="dateDisplay">—</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-area">
    <div class="engine-selector" id="engineSelector"></div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Pesquisar..."
        onkeydown="if(event.key==='Enter') doSearch()">
      <button class="search-go" onclick="doSearch()">Ir →</button>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="categories-section">
    <div class="section-label">Atalhos</div>
    <div class="categories-tabs" id="catTabs"></div>
    <div class="sites-grid" id="sitesGrid"></div>
  </div>

  <div class="divider"></div>

  <!-- NEWS -->
  <div class="news-section">
    <div class="news-header">
      <div class="section-label" style="margin:0">Notícias</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="news-source-tabs" id="newsSourceTabs"></div>
        <button class="news-refresh" id="refreshBtn" onclick="loadNews()" title="Atualizar">↺</button>
      </div>
    </div>
    <div class="news-grid" id="newsGrid">
      <div class="news-loading"><div class="loader"></div><br>Carregando notícias...</div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">⚙️ Configurações</div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>

    <!-- TEMA -->
    <div class="settings-group">
      <div class="settings-group-label">Tema</div>
      <div class="theme-toggle">
        <button class="theme-opt" id="themeDark" onclick="setTheme('dark')">🌙 Escuro</button>
        <button class="theme-opt" id="themeLight" onclick="setTheme('light')">☀️ Claro</button>
      </div>
    </div>

    <!-- MOTORES DE BUSCA -->
    <div class="settings-group">
      <div class="settings-group-label">Motores de busca</div>
      <div class="tags-list" id="engineTagsList"></div>
      <div class="add-input-row">
        <input class="settings-input" id="newEngineName" placeholder="Nome (ex: Bing)">
        <input class="settings-input" id="newEngineUrl" placeholder="URL (ex: https://bing.com/search?q=)">
        <button class="btn-add" onclick="addEngine()">+ Add</button>
      </div>
    </div>

    <!-- CATEGORIAS / SITES -->
    <div class="settings-group">
      <div class="settings-group-label">Categorias e Sites</div>
      <div id="catEditor"></div>
      <div class="add-input-row" style="margin-top:10px">
        <input class="settings-input" id="newCatName" placeholder="Nova categoria">
        <button class="btn-add" onclick="addCategory()">+ Add</button>
      </div>
    </div>

    <!-- FEEDS RSS -->
    <div class="settings-group">
      <div class="settings-group-label">Feeds de Notícias (RSS)</div>
      <div class="tags-list" id="feedTagsList"></div>
      <div class="add-input-row">
        <input class="settings-input" id="newFeedName" placeholder="Nome (ex: G1)">
        <input class="settings-input" id="newFeedUrl" placeholder="URL do RSS">
        <button class="btn-add" onclick="addFeed()">+ Add</button>
      </div>
    </div>

    <button class="btn-save" onclick="saveSettings()">💾 Salvar e fechar</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
